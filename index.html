<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>G12 Countdown</title>
  <link rel="stylesheet" href="test.css">
</head>

<body>

<div class="wrapper">

  <h1>🎓 G12 Matriculation</h1>
  <p class="subtitle">Countdown Timer</p>

  <div class="progress-container">
    <div class="bar">
      <div id="progress"></div>
    </div>
    <p id="progressText">0%</p>
  </div>

  <div class="grid">

    <div class="card">
      <div id="days">0</div>
      <span>Days</span>
    </div>

    <div class="card">
      <div id="hours">0</div>
      <span>Hours</span>
    </div>

    <div class="card">
      <div id="minutes">0</div>
      <span>Minutes</span>
    </div>

    <div class="card">
      <div id="seconds">0</div>
      <span>Seconds</span>
    </div>

  </div>

  <p id="status"></p>

</div>

<script src="test.js"></script>
</body>
</html>
